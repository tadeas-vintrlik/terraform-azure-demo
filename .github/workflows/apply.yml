name: 'Terraform Apply'

on:
  push:
    branches:
      - main

# Permissions for OIDC auth
permissions:
  id-token: write
  contents: read



jobs:
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"
      ARM_USE_OIDC: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup terraform
      uses: hashicorp/setup-terraform@v3

    - name: Get Runner IP
      id: ip
      run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

    - name: Terraform Bootstrap
      working-directory: ./bootstrap
      run: |
        terraform init
        terraform apply -auto-approve -var="current_ip=${{ steps.ip.outputs.ipv4 }}"
        
        # Pass outputs to next step
        echo "SA_NAME=$(terraform output -raw storage_account_name)" >> $GITHUB_ENV
        echo "RG_NAME=$(terraform output -raw resource_group_name)" >> $GITHUB_ENV
        echo "SC_NAME=$(terraform output -raw storage_container_name)" >> $GITHUB_ENV

    - name: Terraform Prod
      working-directory: ./prod
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ env.RG_NAME }}" \
          -backend-config="storage_account_name=${{ env.SA_NAME }}" \
          -backend-config="container_name=${{ env.SC_NAME }}" \
          -reconfigure
        terraform apply -auto-approve
